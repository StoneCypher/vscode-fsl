name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    # Skip CI for PRs that only touch non-build documentation. Conservative
    # list: only entries the build system genuinely doesn't consume.
    # NOT in this list (intentionally): base_README.md (template input to
    # update_madlibs), src/doc_md/**/*.md (typedoc inputs), package.json,
    # build.config.json, build.config.schema.json, anything under src/ts/
    # or src/build_js/.
    paths-ignore:
      - 'src/superpowers/**/*.md'
      - 'CONTRIBUTING.md'
      - 'CODE_OF_CONDUCT.md'
      - 'LICENSE'
      - 'CHANGELOG.md'
      - 'CHANGELOG.long.md'

# Cancel in-progress PR runs when new commits land on the same branch.
# Main pushes are never cancelled — releases must run to completion.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Cache Playwright browsers in a stable workspace-relative path. The
# postinstall step (`npx playwright install --with-deps`) sees this
# location, skips browser download when the cache hits, and only
# re-checks OS-level deps (which apt handles incrementally).
env:
  PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.playwright-browsers





jobs:


  # Escape hatch: detect a `#fullbuild` token in the PR head commit
  # message. Contributors who want the full matrix on a PR (e.g., to
  # verify a cross-platform change before merge) can opt in by pushing
  # a commit whose message contains `#fullbuild`.
  detect-fullbuild:
    # Runs on push as well as PRs. The main-build jobs declare
    # `needs: [detect-fullbuild]`, and a skipped dependency cascades to skip
    # them — so if this job were PR-only, every push-to-main job would skip.
    # On push it simply reports fullbuild=false; the main jobs gate on
    # `github.event_name == 'push'` and run regardless.
    if: >-
      github.event_name == 'pull_request'
      || github.event_name == 'push'
    name: Detect #fullbuild opt-in
    runs-on: ubuntu-latest
    outputs:
      fullbuild: ${{ steps.detect.outputs.fullbuild }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - id: detect
        shell: bash
        run: |
          MSG=$(git log -1 --pretty=%B)
          if echo "$MSG" | grep -q '#fullbuild'; then
            echo "fullbuild=true" >> $GITHUB_OUTPUT
            echo "Detected #fullbuild in head commit message — full matrix will run"
          else
            echo "fullbuild=false" >> $GITHUB_OUTPUT
          fi



  # PR check: a single Ubuntu run with the ci-lite profile.
  # Contributors only pay one cheap job per push to a PR branch. Lint,
  # docs/site rendering, viz, changelog, cloc are caught on merge to
  # main instead — that work is platform-invariant and already runs in
  # test-main-full, so duplicating on PR is wasted tokens.
  # Skipped when #fullbuild opts into the full matrix (test-main-full
  # covers everything test-pr would have).
  test-pr:
    needs: [detect-fullbuild]
    if: github.event_name == 'pull_request' && needs.detect-fullbuild.outputs.fullbuild != 'true'
    name: PR check (Ubuntu, Node 24, ci-lite)
    runs-on: ubuntu-latest
    # Guard against a hung install/build (e.g. a stalled Playwright browser
    # download). Normal runtime is ~1.5 min; 6 min is a generous ceiling that
    # fails fast instead of burning toward GitHub's 360-minute default.
    timeout-minutes: 6
    # ci-lite needs no browser (viz_png off, no e2e), so the postinstall hook
    # skips the Playwright browser download entirely.
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'npm'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: .playwright-browsers
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm install

      - name: Run lite build
        run: npm run build -- --profile=ci-lite



  # Push to main: full build on the canonical platform.
  # Produces docs, site, visualizations, changelog — the artifacts that
  # only need to be built once because they're identical across platforms.
  test-main-full:
    needs: [detect-fullbuild]
    if: github.event_name == 'push' || needs.detect-fullbuild.outputs.fullbuild == 'true'
    name: Main full build (Ubuntu, Node 24)
    runs-on: ubuntu-latest
    # Full canonical build (npm run ci). Cap well above its normal runtime so a
    # hung step fails fast instead of running toward the 360-minute default.
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'npm'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: .playwright-browsers
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm install

      - name: Run full build
        run: npm run ci

      # Hand the freshly built site to deploy-pages. include-hidden-files is
      # required because upload-artifact v4 drops dotfiles by default, and the
      # site needs .nojekyll (TypeDoc emits underscore-prefixed asset paths
      # that Jekyll would otherwise refuse to serve).
      - name: Upload built docs for Pages deploy
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: docs/
          include-hidden-files: true



  # Push to main: publish the built site to the gh-pages branch.
  # GitHub Pages must be configured (Settings → Pages) to deploy from the
  # gh-pages branch, root folder. Deploys only the artifact produced by
  # test-main-full — never rebuilds, so what ships is exactly what passed.
  deploy-pages:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test-main-full]
    name: Publish docs to gh-pages
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # The default GITHUB_TOKEN may be read-only depending on repo settings;
    # pushing the gh-pages branch requires contents write.
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # Download outside docs/ so the deployed tree is purely the CI-built
      # artifact, not a merge with whatever docs/ content is committed on main.
      - name: Download built docs
        uses: actions/download-artifact@v5
        with:
          name: docs-site
          path: _site

      # force_orphan keeps gh-pages as a single commit instead of accreting
      # history — the site includes PNGs and source maps that would bloat the
      # repository quickly otherwise.
      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          force_orphan: true



  # Push to main: cross-platform verification matrix.
  # Uses the ci-lite profile to skip artifact production (docs, site,
  # visualizations, changelog, cloc) because those are platform-invariant
  # and already produced by test-main-full. ci-lite also disables eslint
  # (see build.config.json's ci-lite profile) — lint is Node/OS-invariant
  # too, so it isn't re-run here; test-main-full's single Ubuntu run is the
  # only place eslint gates a push. Tests, typecheck, bundle, and attw DO
  # benefit from multi-platform verification.
  test-main-matrix:
    needs: [detect-fullbuild]
    if: github.event_name == 'push' || needs.detect-fullbuild.outputs.fullbuild == 'true'
    name: Verify Node ${{ matrix.node_version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    # Cross-platform cells; Windows/macOS installs are slower than Ubuntu, so use
    # one generous job ceiling (applies to every cell) to fail fast on hangs.
    timeout-minutes: 25
    # ci-lite profile — no browser needed, so skip the Playwright download.
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

    strategy:
      fail-fast: false
      matrix:
        # Node 23 only on Ubuntu (cheapest runner); macOS (~10× ubuntu cost)
        # and Windows (~2× ubuntu cost) just verify Node 24. Dual-Node
        # coverage is preserved on the cheap platform; expensive platforms
        # don't pay double for marginal value.
        include:
          - os: ubuntu-latest
            node_version: 23
          - os: macos-latest
            node_version: 24
          - os: windows-latest
            node_version: 24

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node_version }}
          cache: 'npm'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: .playwright-browsers
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm install

      - name: Run lite build (no artifact production)
        run: npm run build -- --profile=ci-lite



  stryker:
    # Mutation testing is expensive; only run on push to main, not on every PR.
    # Exception: PRs with #fullbuild in the head commit message opt in.
    needs: [detect-fullbuild]
    if: github.event_name == 'push' || needs.detect-fullbuild.outputs.fullbuild == 'true'
    name: Stryker tests
    runs-on: ${{ matrix.os }}
    # Mutation testing is slow (install + full build + stryker run); give it a
    # large ceiling that still kills a true hang rather than the 360-min default.
    timeout-minutes: 45

    strategy:
      matrix:
        os: [ubuntu-latest]
        node_version: [24]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node_version }}
          cache: 'npm'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: .playwright-browsers
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm install && npm run ci && npm run stryker



  verify-version-bump:

    # Skip this job on the template repository itself — the template package
    # isn't published, so `npm view <name> version` returns nothing and the
    # verification script exits non-zero. "Use this template" creates a new
    # repo with is_template: false, so clones still run this job normally.
    if: github.event.repository.is_template != true

    runs-on: ubuntu-latest
    # Only installs deps and runs verify_version_bump — no browser needed.
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

    steps:
    - uses: actions/checkout@v5
      with:
        # verify_version_bump.cjs compares against the latest git tag, so the
        # job needs full tag history rather than a shallow checkout.
        fetch-depth: 0

    - name: Use Node.js 24.x
      uses: actions/setup-node@v5
      with:
        node-version: 24.x

    - name: Cache Playwright browsers
      uses: actions/cache@v4
      with:
        path: .playwright-browsers
        key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

    - name: Verify the version was bumped
      run: |
        npm install
        node ./src/build_js/verify_version_bump.cjs



  release:

    if: (github.event.pusher.name == github.event.repository.owner.name) && (github.ref == 'refs/heads/main')

    needs: [test-main-full, test-main-matrix, stryker, verify-version-bump]

    runs-on: ubuntu-latest

    # The default GITHUB_TOKEN may be read-only depending on repo settings;
    # creating the tag + release requires contents write (same lesson as the
    # gh-pages job above - the first release run 403'd without this).
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Export tag to envvars
      run: |
        export TAG=$(awk -F'"' '/"version": ".+"/{ print $4; exit; }' package.json)
        echo "TAG=$TAG" >> $GITHUB_ENV
        echo $TAG

    - name: Use Node.js 18.x
      uses: actions/setup-node@v5
      with:
        node-version: 24.x
        registry-url: https://registry.npmjs.org/

    # (A "Push tags" step lived here until 2026-07-16: dead since the port -
    # no locally-created tag exists to push; create-release@v1 below creates
    # the tag itself - and fatal once workflow tokens went read-only.)

    - name: Create the release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ env.TAG }}
        release_name: ${{ env.TAG }}
        body_path: CHANGELOG.md

    # Disabled until a VSCE_PAT secret (an Azure DevOps PAT, Marketplace ->
    # Manage scope - see notes/marketplace-publish.md) is added to this repo's
    # Actions secrets AND the user has deliberately decided to turn on
    # auto-publish. Until then, publishing stays a manual `vsce publish` step.
    # - name: Publish to VS Code Marketplace
    #   run: |
    #     npx vsce publish
    #   env:
    #     VSCE_PAT: ${{ secrets.VSCE_PAT }}

    # - name: Publish to npm
    #   run: |
    #     npm publish
    #   env:
    #     NODE_AUTH_TOKEN: ${{ secrets.TODO_TOKEN_FOR_GH_CI_CD }}

    - name: Results page
      run: |
        export TAG=$(awk -F'"' '/"version": ".+"/{ print $4; exit; }' package.json)
        echo '### Results!' >> $GITHUB_STEP_SUMMARY
        echo "* Published $TAG to NPM" >> $GITHUB_STEP_SUMMARY
